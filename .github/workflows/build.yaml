name: 🚀 Build & Release Linx for Linux

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g. v1.0.0)'
        required: false
        default: 'dev-build'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux App
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ── 2. System dependencies ───────────────────────────────────────────────
      - name: 🔧 Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev libpango1.0-dev libatk1.0-dev \
            libgdk-pixbuf2.0-dev libcairo2-dev

      # ── 3. Flutter setup ─────────────────────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: ✅ Enable Linux desktop target
        run: flutter config --enable-linux-desktop

      - name: 📦 Get dependencies
        run: flutter pub get

      # ── 4. Code quality ──────────────────────────────────────────────────────
      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: 🏗️ Build Linux release
        run: flutter build linux --release --verbose

      # ── 6. Package ───────────────────────────────────────────────────────────
      - name: 📦 Package as tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/linx-linux-x64.tar.gz" .
          echo "✅ Package created: linx-linux-x64.tar.gz"

      - name: 📄 Generate checksums
        run: |
          sha256sum linx-linux-x64.tar.gz > linx-linux-x64.tar.gz.sha256
          cat linx-linux-x64.tar.gz.sha256

      # ── 7. Upload build artifact ─────────────────────────────────────────────
      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linx-linux-x64
          path: |
            linx-linux-x64.tar.gz
            linx-linux-x64.tar.gz.sha256
          retention-days: 14

      # ── 8. Create GitHub Release (on tag push) ───────────────────────────────
      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Linx ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            linx-linux-x64.tar.gz
            linx-linux-x64.tar.gz.sha256
          body: |
            ## 📚 Linx ${{ github.ref_name }} — Linux Study Dashboard

            ### 🚀 Installation
            ```bash
            # Download and extract
            tar -xzf linx-linux-x64.tar.gz

            # Run the app
            ./linx
            ```

            ### ✨ Features
            - 📚 Subject management — add, edit, delete subjects
            - 📝 Test score tracking per subject
            - 📊 Performance analytics with charts
            - 🏠 Dashboard overview with stats
            - 💾 Fully offline — data stored locally in SQLite
            - 🌙 Dark / Light theme toggle

            ### 💻 Requirements
            - Linux x64 (Ubuntu 20.04+ / Debian 11+ / Fedora 34+)
            - GTK 3.0 runtime (`sudo apt install libgtk-3-0`)

            ---
            Built with Flutter 🐦 + Material 3
