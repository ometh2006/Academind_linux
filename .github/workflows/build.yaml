name: 🚀 Build & Release Linx for Linux

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g. v1.0.0)'
        required: false
        default: 'dev-build'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux App
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libglib2.0-dev libpango1.0-dev libatk1.0-dev \
            libgdk-pixbuf2.0-dev libcairo2-dev

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: ✅ Enable Linux desktop target
        run: flutter config --enable-linux-desktop

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔧 Generate correct Linux platform files
        run: |
          flutter create --platforms=linux --project-name=linx /tmp/linx_template
          rm -rf linux/
          cp -r /tmp/linx_template/linux/ linux/

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🏗️ Build Linux release
        run: flutter build linux --release

      - name: 📦 Package as tar.gz
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/linx-linux-x64.tar.gz" .

      - name: 📄 Generate checksums
        run: sha256sum linx-linux-x64.tar.gz > linx-linux-x64.tar.gz.sha256

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linx-linux-x64
          path: |
            linx-linux-x64.tar.gz
            linx-linux-x64.tar.gz.sha256
          retention-days: 14

      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Linx ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            linx-linux-x64.tar.gz
            linx-linux-x64.tar.gz.sha256
          body: |
            ## 📚 Linx ${{ github.ref_name }} — Linux Study Dashboard

            ### 🚀 Installation
            ```bash
            # Install GTK runtime (Ubuntu/Debian)
            sudo apt install libgtk-3-0

            # Extract and run
            tar -xzf linx-linux-x64.tar.gz
            ./linx
            ```

            ### ✨ Features
            - 📚 Subject management
            - 📝 Test score tracking
            - 📊 Performance analytics with charts
            - 🏠 Dashboard overview
            - 💾 Fully offline — SQLite local storage
            - 🌙 Dark / Light theme toggle

            Built with Flutter 🐦 + Material 3
